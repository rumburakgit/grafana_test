global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailhog.:1025'
  smtp_from: 'alertmanager@demo.local'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'email-default'
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
    - match:
        severity: warning
      receiver: 'email-warning'

receivers:
  - name: 'email-default'
    email_configs:
      - to: 'team@demo.local'

  - name: 'email-critical'
    email_configs:
      - to: 'oncall@demo.local'
        headers:
          Subject: 'CRITICAL: {{ .GroupLabels.alertname }}'

  - name: 'email-warning'
    email_configs:
      - to: 'team@demo.local'
        headers:
          Subject: 'WARNING: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
