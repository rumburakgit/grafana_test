global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'null-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'null-receiver'
    - match:
        severity: warning
      receiver: 'null-receiver'

receivers:
  - name: 'null-receiver'
    # No actual notification configured — alerts visible in Alertmanager UI
    # To add email/Slack: add email_configs or slack_configs here

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
